services:
  # PostgreSQL 17
  postgres:
    image: postgres:17-alpine        # PostgreSQL 17 on Alpine
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/initdb:/docker-entrypoint-initdb.d
    networks:
      - backend

  # Redis 8.0
  redis:
    image: redis:8.0.0-alpine3.21     # Redis 8.0 on Alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend

  # RabbitMQ 4.1.0
  rabbitmq:
    image: rabbitmq:4.1.0-management  # RabbitMQ 4.1.0 with management UI
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - backend

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  backend:
    driver: bridge
