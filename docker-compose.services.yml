x-simple-service-env: &simple-service-env
  CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
  EUREKA_URL: ${EUREKA_URL}

x-resource-server-env: &resource-server-env
  CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
  EUREKA_URL: ${EUREKA_URL}
  JWT_ISSUER_URI: ${JWT_ISSUER_URI}
  INTERNAL_API_KEY_PRIMARY: ${INTERNAL_API_KEY_PRIMARY}
  INTERNAL_API_KEY_SECONDARY: ${INTERNAL_API_KEY_SECONDARY}

services:
  config-service:
    build:
      context: .
      dockerfile: microservices/config-service/Dockerfile
    container_name: config-service
    ports:
      - "8888:8888"
    environment:
      SERVER_PORT: 8888
      APP_NAME: config-service
      SPRING_PROFILES_ACTIVE: native
    volumes:
      - ./config-repo:/config-repo
    networks:
      - backend

  discovery-service:
    build: ./microservices/discovery-service
    container_name: discovery-service
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      APP_NAME: discovery-service
      <<: *simple-service-env
    depends_on:
      - config-service
    networks:
      - backend

  api-gateway:
    build: ./microservices/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      APP_NAME: api-gateway
      JWT_ISSUER_URI: ${JWT_ISSUER_URI}
      <<: *simple-service-env
    depends_on:
      - config-service
      - discovery-service
    networks:
      - backend

  auth-service:
    build: ./microservices/auth-service
    container_name: auth-service
    ports:
      - "9000:9000"
    environment:
      SERVER_PORT: 9000
      APP_NAME: auth-service
      POSTGRE_SQL: ${POSTGRE_SQL}
      REDIS_HOST: ${REDIS_HOST}
      RSA_PRIVATE_KEY: ${RSA_PRIVATE_KEY}
      RSA_PUBLIC_KEY: ${RSA_PUBLIC_KEY}
      <<: *resource-server-env
    depends_on:
      - config-service
      - discovery-service
    networks:
      - backend

  user-service:
    build: ./microservices/user-service
    container_name: user-service
    ports:
      - "9100:9100"
    environment:
      SERVER_PORT: 9100
      APP_NAME: user-service
      POSTGRE_SQL: ${POSTGRE_SQL}
      REDIS_HOST: ${REDIS_HOST}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      <<: *resource-server-env
    depends_on:
      - config-service
      - discovery-service
    networks:
      - backend

  project-service:
    build: ./microservices/project-service
    container_name: project-service
    ports:
      - "9200:9200"
    environment:
      SERVER_PORT: 9200
      APP_NAME: project-service
      POSTGRE_SQL: ${POSTGRE_SQL}
      <<: *resource-server-env
    depends_on:
      - config-service
      - discovery-service
    networks:
      - backend

  notification-service:
    build: ./microservices/notification-service
    container_name: notification-service
    ports:
      - "9400:9400"
    environment:
      SERVER_PORT: 9400
      APP_NAME: notification-service
      POSTGRE_SQL: ${POSTGRE_SQL}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      <<: *simple-service-env
    depends_on:
      - config-service
      - discovery-service
    networks:
      - backend

  mcp-service:
    build: ./mcp-service
    container_name: mcp-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DATABASE_URL: ${MCP_DATABASE_URL}
      APP_NAME: mcp-service
      EUREKA_URL: ${EUREKA_URL}
      INTERNAL_API_KEY_PRIMARY: ${INTERNAL_API_KEY_PRIMARY}
      INTERNAL_API_KEY_SECONDARY: ${INTERNAL_API_KEY_SECONDARY}
    depends_on:
      - config-service
      - discovery-service
    networks:
      - backend

networks:
  backend:
    driver: bridge