server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:api-gateway}
  
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      default-filters:
        - name: StripPrefix
          args:
            parts: 1

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:9000/oauth2/jwks}